<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1">
  <title>Contact Angel A. Loaiza</title>
  
  <!-- Font Awesome for Icons -->
  <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.0.0-beta3/css/all.min.css">
  
  <!-- Google Fonts -->
  <link href="https://fonts.googleapis.com/css2?family=Roboto:wght@400;700&family=Bona+Nova+SC:ital,wght@0,400;0,700;1,400&display=swap" rel="stylesheet">
  
  <!-- AOS CSS -->
  <link href="https://cdnjs.cloudflare.com/ajax/libs/aos/2.3.4/aos.css" rel="stylesheet">
  
  <!-- Main CSS -->
  <link rel="stylesheet" href="css/style.css">
</head>
<body>
  <header>
    <nav class="navbar">
      <div class="logo">
        <a href="index.html">Angel A. Loaiza</a>
      </div>
      <ul class="nav-links">
        <li><a href="index.html">About</a></li>
        <li><button id="dark-mode-toggle" class="button">Toggle Dark Mode</button></li>
      </ul>
    </nav>
  </header>
  
  <main>
    <section class="contact-header background" data-aos="fade-up">
      <h1>Contact Angel Loaiza</h1>
      <p class="address">Athens, GA • 404-379-8011 • <a href="mailto:aal51282@uga.edu">aal51282@uga.edu</a></p>
      <hr>
    </section>
    
    <section class="contact-form-section" data-aos="fade-up">
      <form action="mailto:aal51282@uga.edu" method="post" class="contact-form">
        <div class="form-group">
          <label for="name">Name:</label>
          <input type="text" id="name" name="name" required>
        </div>
        
        <div class="form-group">
          <label for="email">Email:</label>
          <input type="email" id="email" name="email" required>
        </div>
        
        <div class="form-group">
          <label for="message">Message:</label>
          <textarea name="message" id="message" cols="30" rows="7" required></textarea>
        </div>
        
        <div class="form-group">
          <input type="submit" value="Submit" class="button">
        </div>
      </form>
    </section>
  </main>
  
  <footer>
    &copy; <a href="index.html">Angel A. Loaiza</a> • 
    <a href="https://www.linkedin.com/in/angelloaiza/" aria-label="LinkedIn"><i class="fab fa-linkedin-in"></i></a>
  </footer>

  <!-- AOS JS -->
  <script src="https://cdnjs.cloudflare.com/ajax/libs/aos/2.3.4/aos.js"></script>
  <!-- Main JavaScript -->
  <script src="js/script.js"></script>
  <script>
    AOS.init({
      duration: 1000,
      once: true
    });
  </script>
</body>
</html>
